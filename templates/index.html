<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Legal Clause Simplifier - Web</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background: #f7f9fc; color: #1f2d3d; }
      .container { max-width: 900px; margin: auto; background: white; padding: 22px; border-radius: 10px; box-shadow: 0 1px 18px rgba(10, 20, 40, 0.1); }
      h1 { margin-bottom: 12px; }
      input, button, select { font-size: 1rem; padding: 10px 12px; margin-top: 8px; width: 100%; box-sizing: border-box; }
      label { font-weight: bold; margin-top: 14px; display: block; }
      .btn { background: #0078d4; color: white; border: none; border-radius: 5px; cursor: pointer; }
      .btn:hover { background: #005aac; }
      .alert { margin-bottom: 14px; color: #a00; }
      .note { font-size: 0.9rem; color: #555; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Legal Clause Simplifier (Web UI)</h1>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}
      <form method="post" action="/analyze" enctype="multipart/form-data">
        <label for="pdf_file">Upload PDF</label>
        <input id="pdf_file" name="pdf_file" type="file" accept="application/pdf" required />

        <label for="max_clauses">Max Clauses (optional)</label>
        <input id="max_clauses" name="max_clauses" type="number" min="1" placeholder="e.g. 40" />

        <label for="min_clause_length">Min Clause Length</label>
        <input id="min_clause_length" name="min_clause_length" type="number" value="30" min="10" />

        <label for="groq_model">Groq Model (optional)</label>
        <input id="groq_model" name="groq_model" type="text" placeholder="e.g. llama-3.3-70b-versatile" />

        <p class="note">Note: Groq API key must be configured by environment variable <code>GROQ_API_KEY</code>. For local test, it's set in terminal.</p>

        <button class="btn" type="submit">Process PDF</button>
      </form>
    </div>
  </body>
</html>
